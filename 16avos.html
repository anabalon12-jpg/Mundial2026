<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mundial 2026 - 16avos</title>
<style>
  :root{
    --bg:#0b3d2e;
    --bg2:#0f4f3b;
    --card:#ffffff;
    --accent:#ffd23f;
    --text:#1a1a1a;
    --muted:#7d8a85;
    --green10:#2e7d32;
    --green5:#9ccc65;
    --red0:#e0e0e0;
    --pitch:#cfe8d6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Trebuchet MS','Segoe UI',sans-serif;
    background:linear-gradient(180deg,var(--bg) 0%,var(--bg2) 100%);
    color:var(--text);
    min-height:100vh;
    padding-bottom:40px;
  }
  header{padding:18px 16px 14px;text-align:center;color:#fff;}
  header h1{margin:0;font-size:1.4rem;letter-spacing:1px;text-transform:uppercase;font-weight:800;}
  header .sub{font-size:.78rem;opacity:.8;margin-top:4px;}
  .tabs{display:flex;gap:6px;padding:10px 12px 0;position:sticky;top:0;z-index:50;background:var(--bg2);}
  .tab{flex:1;text-align:center;padding:10px 4px;font-size:.85rem;font-weight:700;color:#fff;background:rgba(255,255,255,.08);border-radius:10px 10px 0 0;cursor:pointer;user-select:none;border:none;}
  .tab.active{background:var(--card);color:var(--bg);}
  .view{display:none;}
  .view.active{display:block;}
  .content{padding:12px;}
  .card{background:var(--card);border-radius:0 0 14px 14px;padding:12px;box-shadow:0 6px 18px rgba(0,0,0,.18);}

  /* LEADERBOARD */
  .lb-row{display:flex;align-items:center;gap:10px;padding:10px 8px;border-bottom:1px solid #eee;}
  .lb-row:last-child{border-bottom:none;}
  .lb-rank{width:28px;height:28px;border-radius:50%;background:var(--bg2);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.85rem;flex-shrink:0;}
  .lb-row.top1 .lb-rank{background:var(--accent);color:var(--bg);}
  .lb-row.top2 .lb-rank{background:#c0c0c0;color:#333;}
  .lb-row.top3 .lb-rank{background:#cd7f32;color:#fff;}
  .lb-name{flex:1;font-weight:700;font-size:.95rem;}
  .lb-pts{font-weight:800;font-size:1.05rem;color:var(--bg2);}
  .lb-pts small{font-size:.7rem;color:var(--muted);font-weight:500;}
  .lb-detail{font-size:.7rem;color:var(--muted);margin-top:2px;}

  .summary-bar{display:flex;justify-content:space-around;background:var(--bg2);color:#fff;border-radius:10px;padding:10px;margin-bottom:10px;font-size:.78rem;font-weight:700;}
  .summary-bar .big{font-size:1.3rem;display:block;}

  /* GROUP HEADER */
  .group-title{font-weight:800;color:var(--bg2);margin:14px 0 6px;font-size:.85rem;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid var(--pitch);padding-bottom:4px;}
  .group-title:first-child{margin-top:0;}

  /* MATCH ROW */
  .match-row{display:flex;align-items:center;justify-content:space-between;padding:8px 4px;border-bottom:1px solid #f1f1f1;gap:6px;}
  .match-row:last-child{border-bottom:none;}
  .teams{flex:1;font-size:.82rem;font-weight:600;line-height:1.25;}
  .score-input{display:flex;align-items:center;gap:4px;}
  .score-input input{width:40px;height:36px;text-align:center;font-size:1rem;font-weight:700;border:2px solid #ddd;border-radius:8px;-moz-appearance:textfield;}
  .score-input input::-webkit-outer-spin-button,
  .score-input input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  .score-input input:focus{outline:none;border-color:var(--bg2);}
  .score-input input.filled{background:#e8f5e9;border-color:var(--green10);}
  .dash{font-weight:700;color:var(--muted);}

  /* CAMPEÓN INPUT */
  .campeon-row{padding:12px 4px;border-top:2px solid #d8c4f0;margin-top:8px;background:linear-gradient(135deg,#f5f0ff,#faf5ff);border-radius:10px;}
  .campeon-row label{font-size:.85rem;font-weight:700;color:#7c3aed;display:block;margin-bottom:6px;}
  .campeon-row input[type=text]{width:100%;padding:8px 12px;font-size:.95rem;font-weight:700;border:2px solid #d8c4f0;border-radius:8px;}
  .campeon-row input[type=text]:focus{outline:none;border-color:#7c3aed;}
  .campeon-row input[type=text].filled{background:#f3e8ff;border-color:#7c3aed;}
  .group-title.campeon-title{color:#7c3aed;border-bottom-color:#d8c4f0;}

  /* PERSON VIEW */
  .person-select{width:100%;padding:10px;font-size:.95rem;font-weight:700;border-radius:10px;border:2px solid var(--bg2);color:var(--bg2);background:#fff;margin-bottom:10px;}
  .pred-row{display:flex;align-items:center;justify-content:space-between;padding:7px 4px;border-bottom:1px solid #f1f1f1;gap:8px;}
  .pred-row:last-child{border-bottom:none;}
  .pred-teams{flex:1;font-size:.8rem;font-weight:600;}
  .pred-score{font-size:.85rem;font-weight:700;color:var(--bg2);min-width:46px;text-align:center;}
  .pred-pts{width:40px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;color:#fff;flex-shrink:0;}
  .pts-10{background:var(--green10);}
  .pts-5{background:var(--green5);color:#1a1a1a;}
  .pts-0{background:var(--red0);color:#999;}
  .pts-50{background:linear-gradient(135deg,#7c3aed,#a855f7);box-shadow:0 0 0 2px #fff inset;}
  .pts-pending{background:transparent;color:var(--muted);font-weight:600;}

  .reset-wrap{text-align:center;margin-top:18px;}
  .reset-btn{background:none;border:1px solid rgba(255,255,255,.4);color:#fff;font-size:.72rem;padding:6px 14px;border-radius:20px;opacity:.7;}
  .save-indicator{text-align:center;font-size:.7rem;color:rgba(255,255,255,.6);padding:6px 0 0;min-height:18px;}

  /* ANALISIS TAB */
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
  .stat-box{background:#f0f7f4;border-radius:10px;padding:10px;text-align:center;}
  .stat-box .num{font-size:1.4rem;font-weight:800;color:var(--bg2);}
  .stat-box .lbl{font-size:.68rem;color:var(--muted);margin-top:2px;}
  .camp-bar-wrap{margin-bottom:6px;}
  .camp-bar-row{display:flex;align-items:center;gap:8px;padding:6px 0;}
  .camp-flag{font-size:.85rem;font-weight:700;width:90px;flex-shrink:0;}
  .camp-bar-bg{flex:1;background:#eee;border-radius:6px;height:18px;overflow:hidden;}
  .camp-bar-fill{height:100%;background:linear-gradient(90deg,#7c3aed,#a855f7);border-radius:6px;display:flex;align-items:center;padding-left:6px;}
  .camp-bar-fill span{font-size:.68rem;color:#fff;font-weight:700;}
  .camp-count{font-size:.75rem;font-weight:700;color:#7c3aed;width:24px;text-align:right;}
  .uniq-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f1f1f1;}
  .uniq-row:last-child{border-bottom:none;}
  .uniq-name{flex:1;font-size:.82rem;font-weight:600;}
  .uniq-bar-bg{width:90px;background:#eee;border-radius:6px;height:14px;overflow:hidden;flex-shrink:0;}
  .uniq-bar-fill{height:100%;background:#3b82f6;border-radius:6px;}
  .uniq-count{font-size:.78rem;font-weight:700;color:#3b82f6;width:20px;text-align:right;}
  .common-pred-row{display:flex;align-items:center;justify-content:space-between;padding:6px 4px;border-bottom:1px solid #f1f1f1;gap:6px;}
  .common-pred-row:last-child{border-bottom:none;}
  .common-pred-match{flex:1;font-size:.78rem;font-weight:600;}
  .common-pred-score{font-size:.8rem;font-weight:800;color:var(--green10);background:#e8f5e9;padding:2px 8px;border-radius:8px;}
  .common-pred-count{font-size:.68rem;color:var(--muted);margin-left:6px;}
  .prob-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #f1f1f1;}
  .prob-row:last-child{border-bottom:none;}
  .prob-name{flex:1;font-size:.82rem;font-weight:600;}
  .prob-bar-bg{flex:1.4;background:#eee;border-radius:6px;height:14px;overflow:hidden;}
  .prob-bar-fill{height:100%;border-radius:6px;}
  .prob-pct{font-size:.78rem;font-weight:700;width:42px;text-align:right;}
</style>
</head>
<body>

<header>
  <h1>⚽ Mundial 2026</h1>
  <div class="sub">16avos de Final &middot; Quiniela familiar</div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="tabla">Tabla</button>
  <button class="tab" data-tab="resultados">Resultados</button>
  <button class="tab" data-tab="predicciones">Predicciones</button>
  <button class="tab" data-tab="analisis">Análisis</button>
</div>

<div class="content">

  <div class="view active" id="view-tabla">
    <div class="card">
      <div class="summary-bar">
        <div><span class="big" id="played-count">0</span>jugados</div>
        <div><span class="big" id="total-count">17</span>total</div>
        <div><span class="big" id="leader-name">-</span>puntero</div>
      </div>
      <div id="leaderboard"></div>
    </div>
  </div>

  <div class="view" id="view-resultados">
    <div class="card" id="results-card"></div>
  </div>

  <div class="view" id="view-predicciones">
    <select class="person-select" id="person-select"></select>
    <div class="card" id="predictions-card"></div>
  </div>

  <div class="view" id="view-analisis">
    <div class="card" id="analisis-card"></div>
  </div>

</div>

<div class="reset-wrap">
  <button class="reset-btn" id="reset-btn">Borrar todos los resultados</button>
  <div class="save-indicator" id="save-indicator"></div>
</div>

<script>
const matches = [
  "Sudáfrica vs Canadá",
  "Brasil vs Japón",
  "Alemania vs Paraguay",
  "Países Bajos vs Marruecos",
  "Costa de Marfil vs Noruega",
  "Francia vs Suecia",
  "México vs Ecuador",
  "Inglaterra vs RD Congo",
  "Bélgica vs Senegal",
  "EE.UU. vs Bosnia y Herzegovina",
  "España vs Austria",
  "Portugal vs Croacia",
  "Suiza vs Argelia",
  "Australia vs Egipto",
  "Argentina vs Cabo Verde",
  "Colombia vs Ghana",
];
const CAMPEON_IDX = 16;

// [local, visita] x16 + campeón string
const data = {
"Daniela Pavez":     [[1,2],[3,1],[2,1],[2,1],[1,2],[3,1],[2,1],[3,0],[2,1],[2,0],[2,1],[1,2],[2,1],[1,1],[4,0],[2,0],"Argentina"],
"Esteban Sepúlveda": [[1,1],[3,2],[4,1],[2,1],[0,2],[4,1],[1,2],[3,0],[2,1],[3,0],[2,0],[3,2],[2,1],[0,2],[3,0],[3,1],"Países Bajos"],
"Víctor Cáceres":    [[1,3],[2,1],[3,0],[3,1],[1,2],[3,1],[2,1],[2,1],[2,0],[3,1],[2,1],[2,2],[1,0],[1,2],[3,0],[1,1],"Francia"],
"Benjamin Pavez":    [[1,2],[1,0],[2,1],[2,2],[2,4],[4,0],[0,0],[3,1],[1,2],[4,0],[1,0],[3,2],[1,1],[3,1],[5,0],[2,0],"Francia"],
"Sebastián Vega":    [[2,2],[1,1],[0,1],[2,2],[1,2],[4,2],[0,1],[2,0],[1,1],[3,0],[2,0],[0,0],[1,0],[1,2],[3,1],[3,2],"Japón"],
"Carlos Anabalón":   [[1,3],[2,1],[3,1],[2,1],[1,2],[3,1],[2,1],[3,1],[1,2],[2,1],[3,1],[2,1],[1,2],[1,2],[3,0],[2,1],"Países Bajos"],
"Sebastián Sepúlveda":[[1,2],[3,1],[2,0],[2,1],[1,2],[3,0],[2,1],[3,0],[1,2],[2,1],[2,0],[2,1],[1,0],[2,1],[4,0],[2,0],"Francia"],
"Sergio Valencia":   [[1,2],[2,1],[2,0],[2,1],[1,1],[3,1],[1,2],[2,0],[1,1],[1,2],[2,0],[1,0],[1,1],[0,1],[0,0],[1,0],"Países Bajos"],
"Mateo Rojas":       [[0,2],[3,1],[2,0],[1,1],[1,2],[4,1],[1,2],[4,0],[1,1],[2,0],[3,0],[1,1],[3,2],[1,3],[4,1],[2,0],"Francia"],
"Israel Rojas":      [[0,2],[2,1],[3,1],[2,1],[1,3],[3,0],[2,1],[3,1],[2,2],[3,0],[2,1],[2,1],[1,1],[1,2],[3,1],[2,1],"Francia"],
};

const names = Object.keys(data);
const STORAGE_KEY = "mundial_16avos";

// Default results (3 ya jugados)
const DEFAULT_RESULTS = {
  0: [0,1],   // Sudáfrica vs Canadá
  1: [2,1],   // Brasil vs Japón
  2: [1,1],   // Alemania vs Paraguay
};

let results = {};

function ptsFor(pred, real) {
  if (!real) return null;
  if (typeof pred === 'string') {
    if (!real) return null;
    return pred.toLowerCase() === real.toLowerCase() ? 50 : 0;
  }
  const [pl,pv] = pred;
  const [rl,rv] = real;
  if (pl===rl && pv===rv) return 10;
  if (Math.sign(pl-pv) === Math.sign(rl-rv)) return 5;
  return 0;
}

function computeTotal(name) {
  let total=0, played=0;
  for (let i=0; i<16; i++) {
    const real = getValid(i);
    const p = ptsFor(data[name][i], real);
    if (p !== null) { total += p; played++; }
  }
  // campeón
  const rc = results['c'];
  if (rc) {
    const cp = ptsFor(data[name][CAMPEON_IDX], rc);
    if (cp !== null) { total += cp; played++; }
  }
  return {total, played};
}

function getValid(idx) {
  const r = results[idx];
  if (!r) return null;
  if (r[0]==="" || r[1]==="") return null;
  return [r[0], r[1]];
}

async function loadResults() {
  try {
    const v = localStorage.getItem(STORAGE_KEY);
    if (v) { results = JSON.parse(v); }
    else {
      results = JSON.parse(JSON.stringify(DEFAULT_RESULTS));
      localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
    }
  } catch(e) { results = JSON.parse(JSON.stringify(DEFAULT_RESULTS)); }
}

async function saveResults() {
  const ind = document.getElementById('save-indicator');
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(results));
    ind.textContent = "Guardado ✓";
    setTimeout(()=>{ind.textContent="";}, 1200);
  } catch(e) { ind.textContent = "Error al guardar"; }
}

function renderLeaderboard() {
  const lb = document.getElementById('leaderboard');
  const totals = names.map(n => ({name:n, ...computeTotal(n)}));
  totals.sort((a,b) => b.total - a.total);
  lb.innerHTML = "";
  totals.forEach((t,i) => {
    const row = document.createElement('div');
    row.className = 'lb-row'+(i===0?' top1':i===1?' top2':i===2?' top3':'');
    row.innerHTML = `
      <div class="lb-rank">${i+1}</div>
      <div>
        <div class="lb-name">${t.name}</div>
        <div class="lb-detail">${t.played} partido${t.played===1?'':'s'} jugado${t.played===1?'':'s'}</div>
      </div>
      <div style="flex:1"></div>
      <div class="lb-pts">${t.total} <small>pts</small></div>
    `;
    lb.appendChild(row);
  });
  const playedCount = Object.keys(results).filter(k => k !== 'c').length;
  document.getElementById('played-count').textContent = playedCount;
  document.getElementById('leader-name').textContent = totals[0] ? totals[0].name.split(' ')[0] : '-';
}

function renderResults() {
  const card = document.getElementById('results-card');
  card.innerHTML = "";

  // Matches
  const h = document.createElement('div');
  h.className = 'group-title';
  h.textContent = '16avos de Final';
  card.appendChild(h);

  matches.forEach((m, i) => {
    const row = document.createElement('div');
    row.className = 'match-row';
    const real = results[i] || ["",""];
    row.innerHTML = `
      <div class="teams">${m}</div>
      <div class="score-input">
        <input type="number" min="0" inputmode="numeric" data-idx="${i}" data-side="0" value="${real[0]}" class="${real[0]!==''?'filled':''}">
        <span class="dash">-</span>
        <input type="number" min="0" inputmode="numeric" data-idx="${i}" data-side="1" value="${real[1]}" class="${real[1]!==''?'filled':''}">
      </div>
    `;
    card.appendChild(row);
  });

  // Campeón
  const ch = document.createElement('div');
  ch.className = 'group-title campeon-title';
  ch.textContent = '🏆 Campeón del Mundial (50 pts)';
  card.appendChild(ch);

  const campRow = document.createElement('div');
  campRow.className = 'campeon-row';
  campRow.innerHTML = `
    <label>¿Quién ganó el Mundial?</label>
    <input type="text" id="campeon-input" placeholder="Ej: Francia" value="${results['c']||''}" class="${results['c']?'filled':''}">
  `;
  card.appendChild(campRow);

  card.querySelectorAll('input[type=number]').forEach(inp => {
    inp.addEventListener('input', onResultInput);
  });
  document.getElementById('campeon-input').addEventListener('input', onCampeonInput);
}

function onResultInput(e) {
  const idx = parseInt(e.target.dataset.idx);
  const side = parseInt(e.target.dataset.side);
  const val = e.target.value;
  if (!results[idx]) results[idx] = ["",""];
  results[idx][side] = val==="" ? "" : Math.max(0, parseInt(val)||0);
  if (results[idx][0]==="" && results[idx][1]==="") delete results[idx];
  e.target.classList.toggle('filled', val!=="");
  saveResults(); renderLeaderboard(); renderPredictions(); renderAnalisis();
}

function onCampeonInput(e) {
  const val = e.target.value.trim();
  results['c'] = val || null;
  if (!val) delete results['c'];
  e.target.classList.toggle('filled', !!val);
  saveResults(); renderLeaderboard(); renderPredictions(); renderAnalisis();
}

function renderPersonSelect() {
  const sel = document.getElementById('person-select');
  sel.innerHTML = names.map(n=>`<option value="${n}">${n}</option>`).join('');
  sel.addEventListener('change', renderPredictions);
}

function renderPredictions() {
  const sel = document.getElementById('person-select');
  const name = sel.value || names[0];
  const card = document.getElementById('predictions-card');
  card.innerHTML = "";

  const h = document.createElement('div');
  h.className = 'group-title';
  h.textContent = '16avos de Final';
  card.appendChild(h);

  matches.forEach((m, i) => {
    const pred = data[name][i];
    const real = getValid(i);
    const pts = ptsFor(pred, real);
    let ptsHtml;
    if (pts===null) ptsHtml = `<div class="pred-pts pts-pending">-</div>`;
    else ptsHtml = `<div class="pred-pts pts-${pts}">${pts}</div>`;

    const row = document.createElement('div');
    row.className = 'pred-row';
    row.innerHTML = `
      <div class="pred-teams">${m}</div>
      <div class="pred-score">${pred[0]} - ${pred[1]}</div>
      ${ptsHtml}
    `;
    card.appendChild(row);
  });

  // Campeón
  const ch = document.createElement('div');
  ch.className = 'group-title campeon-title';
  ch.textContent = '🏆 Campeón del Mundial (50 pts)';
  card.appendChild(ch);

  const camp = data[name][CAMPEON_IDX];
  const realCamp = results['c'] || null;
  const campPts = ptsFor(camp, realCamp);
  let campPtsHtml;
  if (campPts===null) campPtsHtml = `<div class="pred-pts pts-pending">-</div>`;
  else campPtsHtml = `<div class="pred-pts pts-${campPts===50?'50':campPts}">${campPts}</div>`;

  const campRow = document.createElement('div');
  campRow.className = 'pred-row';
  campRow.innerHTML = `
    <div class="pred-teams">¿Campeón del Mundial?</div>
    <div class="pred-score" style="min-width:80px">${camp}</div>
    ${campPtsHtml}
  `;
  card.appendChild(campRow);
}

// ── ANÁLISIS ──────────────────────────────────────────────────────────────
const CHAMPION_PICKS = {
  "Francia": ["Víctor Cáceres","Benjamin Pavez","Sebastián Sepúlveda","Mateo Rojas","Israel Rojas"],
  "Países Bajos": ["Esteban Sepúlveda","Carlos Anabalón","Sergio Valencia"],
  "Argentina": ["Daniela Pavez"],
  "Japón": ["Sebastián Vega"],
};

const MOST_COMMON_PREDICTIONS = [
  {match:"Países Bajos vs Marruecos", score:"2-1", count:6},
  {match:"Costa de Marfil vs Noruega", score:"1-2", count:6},
  {match:"México vs Ecuador", score:"2-1", count:5},
  {match:"España vs Austria", score:"2-0", count:4},
  {match:"Australia vs Egipto", score:"1-2", count:4},
  {match:"Colombia vs Ghana", score:"2-0", count:4},
  {match:"Francia vs Suecia", score:"3-1", count:4},
];

function countUniquePredictions(name) {
  let count = 0;
  for (let i=3; i<16; i++) {
    const mine = JSON.stringify(data[name][i]);
    const others = names.filter(o=>o!==name).some(o=>JSON.stringify(data[o][i])===mine);
    if (!others) count++;
  }
  return count;
}

function renderAnalisis() {
  const card = document.getElementById('analisis-card');
  card.innerHTML = "";

  const totals = names.map(n=>({name:n,...computeTotal(n)}));
  totals.sort((a,b)=>b.total-a.total);
  const playedCount = Object.keys(results).filter(k=>k!=='c').length;

  const statGrid = document.createElement('div');
  statGrid.className = 'stat-grid';
  statGrid.innerHTML =
    '<div class="stat-box"><div class="num">' + playedCount + '/16</div><div class="lbl">Partidos jugados</div></div>' +
    '<div class="stat-box"><div class="num">' + (10*(16-playedCount)+50) + '</div><div class="lbl">Pts en juego</div></div>' +
    '<div class="stat-box"><div class="num">' + (totals[0]?totals[0].total:0) + '</div><div class="lbl">Puntaje lider</div></div>' +
    '<div class="stat-box"><div class="num">' + totals.length + '</div><div class="lbl">Participantes</div></div>';
  card.appendChild(statGrid);

  const ct = document.createElement('div');
  ct.className = 'group-title campeon-title';
  ct.textContent = 'Campeon elegido por cada uno';
  card.appendChild(ct);

  const campWrap = document.createElement('div');
  campWrap.className = 'camp-bar-wrap';
  const totalPicks = names.length;
  Object.entries(CHAMPION_PICKS).sort(function(a,b){return b[1].length-a[1].length;}).forEach(function(entry){
    const team = entry[0], people = entry[1];
    const pct = (people.length/totalPicks)*100;
    const row = document.createElement('div');
    row.className = 'camp-bar-row';
    row.title = people.join(', ');
    row.innerHTML =
      '<div class="camp-flag">' + team + '</div>' +
      '<div class="camp-bar-bg"><div class="camp-bar-fill" style="width:' + pct + '%"><span>' + people.length + '</span></div></div>' +
      '<div class="camp-count">' + Math.round(pct) + '%</div>';
    campWrap.appendChild(row);
  });
  card.appendChild(campWrap);
  const campNote = document.createElement('div');
  campNote.style.fontSize = '.68rem';
  campNote.style.color = 'var(--muted)';
  campNote.style.marginTop = '4px';
  campNote.textContent = 'Manten presionado sobre una barra para ver quien eligio ese equipo';
  card.appendChild(campNote);

  const ut = document.createElement('div');
  ut.className = 'group-title';
  ut.textContent = 'Predicciones unicas (sin coincidencias)';
  card.appendChild(ut);
  const uNote = document.createElement('div');
  uNote.style.fontSize='.7rem'; uNote.style.color='var(--muted)'; uNote.style.marginBottom='6px';
  uNote.textContent = 'Mas unicas = mas chance de despegarse del grupo si acierta';
  card.appendChild(uNote);

  const uniqData = names.map(function(n){ return {name:n, uniq:countUniquePredictions(n)}; });
  uniqData.sort(function(a,b){return b.uniq-a.uniq;});
  const maxUniq = Math.max.apply(null, uniqData.map(function(u){return u.uniq;}).concat([1]));
  uniqData.forEach(function(u){
    const pct = (u.uniq/maxUniq)*100;
    const row = document.createElement('div');
    row.className = 'uniq-row';
    row.innerHTML =
      '<div class="uniq-name">' + u.name + '</div>' +
      '<div class="uniq-bar-bg"><div class="uniq-bar-fill" style="width:' + pct + '%"></div></div>' +
      '<div class="uniq-count">' + u.uniq + '</div>';
    card.appendChild(row);
  });

  const pt = document.createElement('div');
  pt.className = 'group-title';
  pt.textContent = 'Pronosticos mas repetidos';
  card.appendChild(pt);
  const pNote = document.createElement('div');
  pNote.style.fontSize='.7rem'; pNote.style.color='var(--muted)'; pNote.style.marginBottom='6px';
  pNote.textContent = 'Lo que predice la mayoria del grupo';
  card.appendChild(pNote);

  MOST_COMMON_PREDICTIONS.forEach(function(p){
    const row = document.createElement('div');
    row.className = 'common-pred-row';
    row.innerHTML =
      '<div class="common-pred-match">' + p.match + '</div>' +
      '<div><span class="common-pred-score">' + p.score + '</span><span class="common-pred-count">' + p.count + '/10</span></div>';
    card.appendChild(row);
  });

  const prt = document.createElement('div');
  prt.className = 'group-title';
  prt.textContent = 'Probabilidad estimada de ganar';
  card.appendChild(prt);
  const prNote = document.createElement('div');
  prNote.style.fontSize='.7rem'; prNote.style.color='var(--muted)'; prNote.style.marginBottom='6px';
  prNote.textContent = 'Estimacion segun puntaje actual y predicciones unicas restantes';
  card.appendChild(prNote);

  const remaining = 16 - playedCount;
  const weights = names.map(function(n){
    const t = totals.find(function(x){return x.name===n;});
    const u = uniqData.find(function(x){return x.name===n;}).uniq;
    const w = Math.max(0, t.total) + u*4 + remaining*2;
    return {name:n, w:w, total:t.total};
  });
  const sumW = weights.reduce(function(a,b){return a+b.w;},0) || 1;
  weights.sort(function(a,b){return b.w-a.w;});
  weights.forEach(function(item){
    const pct = (item.w/sumW)*100;
    const col = pct>=20?'#22c55e':pct>=10?'#f59e0b':'#ef4444';
    const row = document.createElement('div');
    row.className = 'prob-row';
    row.innerHTML =
      '<div class="prob-name">' + item.name + '</div>' +
      '<div class="prob-bar-bg"><div class="prob-bar-fill" style="width:' + pct + '%;background:' + col + '"></div></div>' +
      '<div class="prob-pct" style="color:' + col + '">' + pct.toFixed(1) + '%</div>';
    card.appendChild(row);
  });
}

function setupTabs() {
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('view-'+tab.dataset.tab).classList.add('active');
    });
  });
}

async function init() {
  await loadResults();
  setupTabs();
  renderPersonSelect();
  renderLeaderboard();
  renderResults();
  renderPredictions();
  renderAnalisis();

  document.getElementById('reset-btn').addEventListener('click', async () => {
    if (confirm('¿Borrar todos los resultados ingresados?')) {
      results = {};
      await saveResults();
      renderLeaderboard(); renderResults(); renderPredictions(); renderAnalisis();
    }
  });
}

init();
</script>
</body>
</html>
